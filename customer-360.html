<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>OliPoly Engine | Customer 360</title>

splay:grid;grid-template-columns:1fr 1fr;gap:14px}.section h3{margin:0 0 10px}.list{display:grid;gap:8px}.item-head{display:flex;justify-content:space-between;gap:10px}.item h4{margin:0 0 5px}.item p{margin:6px 0;color:var(--muted);font-size:.84rem}.item .actions{margin-top:9px}.item .ghost,.item .btn{font-size:.75rem;min-height:34px;padding:7px 10px}.timeline .item{display:grid;grid-template-columns:125px 1fr;gap:12px}.empty{padding:13px;border:1px dashed var(--line);border-radius:15px;color:var(--muted)}.business{border-color:rgba(255,196,94,.35)}.hidden{display:none!important}@media(max-width:900px){.metrics{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}@media(max-width:600px){.wrap{width:calc(100% - 16px)}.topbar,.overview-head{align-items:stretch;flex-direction:column}.topbar nav a{flex:1}.lookup{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}.timeline .item{grid-template-columns:1fr}}
</style><script src="js/olipoly-auth.js"></script><script src="js/workflow-status.js"></script><script src="js/customer-360.js"></script><link rel="stylesheet" href="css/job-assets.css">
</head><body><div class="wrap">
<header class="topbar"><a class="brand" href="hub.html"><h1>👤 Customer 360</h1><small>Complete read-only customer history</small></a><nav><a class="ghost" href="hub.html">← Hub</a><a class="ghost" href="ERP_1_0_HANDBOOK.md#authentication-hub-and-customer-360">Help</a><a class="ghost" href="orders-admin.html">Orders</a><a class="ghost" href="finance-pro.html">Finance</a><a class="btn" href="quote.html">Quote</a></nav></header>
<div class="lookup"><input id="search" placeholder="Exact customer name, email, phone, company, Q- or OP- number" autocomplete="off"><button id="searchBtn" class="btn">Find Customer</button></div><div id="message" class="empty">Loading customer records…</div>
<main id="content" class="hidden"><section class="card"><div class="overview-head"><div><span class="eyebrow">Customer overview</span><h2 id="customerName"></h2><div id="customerContact" class="muted"></div></div><div id="customerType" class="pill"></div></div><div id="metrics" class="metrics"></div></section>
<section id="businessPanel" class="section business hidden"><h3>Business / PO Details</h3><div id="businessDetails" class="metrics"></div></section>
<div class="grid"><section class="section"><h3>Active Work</h3><div id="active" class="list"></div></section><section class="section"><h3>Financial Summary</h3><div id="finance" class="metrics"></div><div id="financeLinks" class="actions"></div></section></div>
<div class="grid"><section class="section"><h3>Quote History</h3><div id="quotes" class="list"></div></section><section class="section"><h3>Completed Orders & Repeat Opportunities</h3><div id="completed" class="list"></div></section></div>
<section class="section timeline"><h3>Unified Timeline</h3><div id="timeline" class="list"></div></section></main></div>
<script>
(function(){'use strict';const C=window.OliPolyCustomer360,$=id=>document.getElementById(id),money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Number(v)||0),esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),clean=v=>String(v??'').trim(),SUPABASE_URL='https://alffoktlwhpfothieude.supabase.co',SUPABASE_KEY='sb_publishable_z7kdHOnVhLgBpn0uXwd4GA_tXwWQx_Y';let data={orders:[],quotes:[],jobs:[],events:[]};
function local(key){try{const value=JSON.parse(localStorage.getItem(key)||'[]');return Array.isArray(value)?value:[]}catch{return[]}}
async function table(name,order='updated_at.desc'){const token=window.OliPolyAuth?.getToken?.()||localStorage.getItem('sb_token');if(!token)return[];try{const res=await fetch(`${SUPABASE_URL}/rest/v1/${name}?select=*&order=${order}&limit=1000`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${token}`}});return res.ok?await res.json():[]}catch{return[]}}
function normalizeLocalQuote(q){const fields=q.quoteData?.fields||{};return {...q,quote_number:q.quote_number||q.quoteNumber,quote_status:q.quote_status||q.quoteStatus,customer_name:q.customer_name||q.customerName||fields.customerName,customer_email:q.customer_email||q.customerEmail||fields.customerEmail,customer_phone:q.customer_phone||fields.customerPhone,company_name:q.company_name||fields.companyName,quote_title:q.quote_title||q.quoteTitle,quote_total:q.quote_total??q.quoteTotal,updated_at:q.updated_at||q.updatedAt};}
async function load(){await window.OliPolyAuth?.ensure?.();const [orders,quotes,jobs,events]=await Promise.all([table('orders','updated_at.desc'),table('quotes','updated_at.desc'),table('production_jobs','updated_at.desc'),table('project_events','created_at.desc')]);data={orders:C.dedupe(orders,'order'),quotes:C.dedupe([...local('olipoly_quote_history_v3').map(normalizeLocalQuote),...quotes],'quote'),jobs:C.dedupe([...local('olipoly_production_jobs_v3'),...jobs],'job'),events:C.dedupe(events,'event')};renderSearch();}
function findSeed(q){const n=clean(q).toLowerCase();if(!n)return null;const all=[...data.orders,...data.quotes,...data.jobs];return all.find(r=>[r.order_number,r.quote_number,r.quoteNumber,r.customer_id].some(v=>clean(v).toLowerCase()===n))||all.find(r=>[r.customer_email,r.customerEmail,r.customer_phone,r.phone,r.company_name,r.shipping_company,r.customer_name,r.customerName].some(v=>clean(v).toLowerCase()===n))||null;}
const empty=t=>`<div class="empty">${esc(t)}</div>`,link=(label,href,primary=false)=>`<a class="${primary?'btn':'ghost'}" href="${esc(href)}">${esc(label)}</a>`;
function orderCard(o,reorder=false){const job=data.jobs.find(j=>clean(j.order_number)===clean(o.order_number)),st=job?.production_status||o.status||'active',due=o.invoice_due_date||o.due_date||o.target_date||o.turnaround||'No due date',paid=o.payment_status||'unpaid';return `<article class="item"><div class="item-head"><h4>${esc(o.order_number||'OP-')} · ${esc(o.order_title||job?.job_title||'Untitled project')}</h4><strong>${money(C.amount(o))}</strong></div><p>${esc(st.replace(/_/g,' '))} · Payment: ${esc(paid.replace(/_/g,' '))} · Due/turnaround: ${esc(due)}</p><div class="actions">${link('Orders Admin',C.deepLink('orders-admin.html',o))}${link('Production',C.deepLink('production-control.html',o))}${o.tracking_number?link('Track',`orders-admin.html?search=${encodeURIComponent(o.tracking_number)}`):''}${reorder?`<button class="btn reorder" data-order="${esc(o.order_number)}">Repeat / Reorder</button>`:''}</div></article>`}
function render(bundle){const seed=bundle.seed,name=seed.customer_name||seed.customerName||seed.contact_name||'Customer',company=seed.company_name||seed.shipping_company||'',email=seed.customer_email||seed.customerEmail||'',phone=seed.customer_phone||seed.phone||'';$('customerName').textContent=name;$('customerContact').textContent=[company,email,phone].filter(Boolean).join(' • ')||'No contact fields recorded';$('customerType').textContent=bundle.business?'Business / PO':'Retail';const metrics=[['First activity',bundle.firstActivity.slice(0,10)||'—'],['Most recent',bundle.lastActivity.slice(0,10)||'—'],['Accepted value',money(bundle.finance.acceptedValue)],['Total paid',money(bundle.finance.paid)],['Outstanding',money(bundle.finance.outstanding)],['Active orders',bundle.activeOrders.length],['Completed orders',bundle.completedOrders.length]];$('metrics').innerHTML=metrics.map(x=>`<div class="metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('');$('active').innerHTML=bundle.activeOrders.length?bundle.activeOrders.map(o=>orderCard(o)).join(''):empty('No active orders.');$('completed').innerHTML=bundle.completedOrders.length?bundle.completedOrders.map(o=>orderCard(o,true)).join(''):empty('No completed orders available for repeat ordering.');
$('quotes').innerHTML=bundle.quotes.length?bundle.quotes.map(q=>{const order=C.quoteOrderLink(q,bundle.orders);return `<article class="item"><div class="item-head"><h4>${esc(q.quote_number||q.quoteNumber||'Quote')} · ${esc(q.quote_title||q.quoteTitle||'Untitled')}</h4><strong>${money(C.amount(q))}</strong></div><p>${esc(q.quote_status||q.quoteStatus||'saved')} · ${esc((q.sent_at||q.updated_at||q.updatedAt||'').slice(0,10))}</p><div class="actions">${link('Open Quote',`quote.html?quote=${encodeURIComponent(q.quote_number||q.quoteNumber||'')}`)}${order?link('Accepted Order',order):''}</div></article>`}).join(''):empty('No quote history matched this identity.');
$('finance').innerHTML=[['Accepted orders',money(bundle.finance.acceptedValue)],['Paid',money(bundle.finance.paid)],['Balance',money(bundle.finance.outstanding)],['Invoice balance',money(bundle.finance.invoiceOutstanding)]].map(x=>`<div class="metric"><span>${x[0]}</span><strong>${x[1]}</strong></div>`).join('');$('financeLinks').innerHTML=link('Open Finance',`finance-pro.html?search=${encodeURIComponent(email||name)}`)+link('Orders Admin',`orders-admin.html?search=${encodeURIComponent(email||name)}`);
$('timeline').innerHTML=bundle.timeline.length?bundle.timeline.map(i=>`<article class="item"><small>${esc(i.date.slice(0,16).replace('T',' '))}</small><div><strong>${esc(i.title)}</strong><p>${typeof i.detail==='number'?money(i.detail):esc(i.detail)}</p></div></article>`).join(''):empty('No dated activity is available.');$('businessPanel').classList.toggle('hidden',!bundle.business);if(bundle.business){const po=[...new Set(bundle.orders.map(o=>o.po_number).filter(Boolean))].join(', ')||'—',inv=[...new Set(bundle.orders.map(o=>o.invoice_number).filter(Boolean))].join(', ')||'—',terms=[...new Set(bundle.orders.map(o=>o.invoice_terms).filter(Boolean))].join(', ')||'—';$('businessDetails').innerHTML=[['Company',company||'—'],['PO numbers',po],['Invoices',inv],['Payment terms',terms],['Outstanding invoices',money(bundle.finance.invoiceOutstanding)]].map(x=>`<div class="metric"><span>${x[0]}</span><strong>${esc(x[1])}</strong></div>`).join('')}$('message').classList.add('hidden');$('content').classList.remove('hidden');document.querySelectorAll('.reorder').forEach(btn=>btn.onclick=()=>{const order=bundle.completedOrders.find(o=>clean(o.order_number)===btn.dataset.order);if(!order)return;localStorage.setItem('olipoly_reorder_quote_draft_v1',JSON.stringify(C.reorderDraft(order)));location.href=`quote.html?reorder=${encodeURIComponent(order.order_number||'reorder')}`});}
function renderSearch(){const q=$('search').value||new URLSearchParams(location.search).get('search')||'';if(q&&!$('search').value)$('search').value=q;const seed=findSeed(q);if(!seed){$('content').classList.add('hidden');$('message').classList.remove('hidden');$('message').textContent=q?'No exact customer identity or identifier match found. Similar names are not combined.':'Enter an exact customer identity or record identifier.';return}history.replaceState(null,'','?search='+encodeURIComponent(q));render(C.build(data,seed));}
$('searchBtn').onclick=renderSearch;$('search').onkeydown=e=>{if(e.key==='Enter')renderSearch()};load();})();
</script>
