<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OliPoly Orders Admin</title>

<style>
body{font-family:Inter,sans-serif;padding:20px;background:#0b1020;color:#fff}
.card{background:#121833;padding:20px;border-radius:16px;margin-bottom:20px}
input,select,textarea{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:none}
button{padding:10px 14px;margin:6px;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(135deg,#de6fb8,#9d7cff);color:white}
.note{white-space:pre-wrap;background:#1a2145;padding:12px;border-radius:12px;margin-top:10px}
</style>
</head>

<body>

<h2>Orders Admin</h2>

<div class="card">
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="signup()">Create Account</button>
<div id="authMsg"></div>
</div>

<div class="card">
<input id="orderNumber" placeholder="Order #">
<input id="orderTitle" placeholder="Project">
<select id="status">
<option value="quote_sent">Quote Sent</option>
<option value="awaiting_deposit">Awaiting Deposit</option>
<option value="in_production">In Production</option>
<option value="completed">Completed</option>
</select>

<textarea id="publicStatusText" placeholder="Public status"></textarea>
<textarea id="publicNextStep" placeholder="Next step"></textarea>
<textarea id="shippingNote" placeholder="Pickup / shipping"></textarea>
<input id="tracking" placeholder="Tracking #">
<input id="paymentLink" placeholder="Payment link">

<button onclick="save()">Save Order</button>
<button onclick="loadOrders()">Load Orders</button>

<pre id="output"></pre>
</div>

<script>
const URL='https://alffoktlwhpfothieude.supabase.co';
const KEY='sb_publishable_z7kdHOnVhLgBpn0uXwd4GA_tXwWQx_Y';

let token=null;

async function api(path,opt={}){
  const res=await fetch(URL+path,{
    ...opt,
    headers:{
      apikey:KEY,
      'Content-Type':'application/json',
      ...(token?{Authorization:`Bearer ${token}`}:{})
    }
  });
  return await res.json();
}

async function signup(){
  const r=await api('/auth/v1/signup',{method:'POST',body:JSON.stringify({
    email:email.value,password:password.value
  })});
  authMsg.innerText="Check email or login";
}

async function login(){
  const r=await api('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({
    email:email.value,password:password.value
  })});
  token=r.access_token;
  authMsg.innerText="Logged in";
}

async function save(){

  const payload={
    order_number:orderNumber.value,
    order_title:orderTitle.value,
    status:status.value,
    payment_status:"unpaid",
    public_status_text:publicStatusText.value,
    public_next_step:publicNextStep.value,
    shipping_or_pickup_note:shippingNote.value,
    tracking_number:tracking.value,
    payment_link:paymentLink.value
  };

  await api('/rest/v1/orders',{method:'POST',body:JSON.stringify(payload)});

  await api('/rest/v1/order_tracking_public?on_conflict=order_number',{
    method:'POST',
    body:JSON.stringify(payload)
  });

  alert("Saved");
}

async function loadOrders(){
  const data=await api('/rest/v1/orders?select=*');
  output.textContent=JSON.stringify(data,null,2);
}
</script>

</body>
</html>
