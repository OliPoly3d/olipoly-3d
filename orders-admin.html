<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OliPoly 3D | Orders Admin</title>
  <style>
    :root{
      --bg:#08101f; --panel:rgba(12,19,40,.88); --line:rgba(126,144,255,.18);
      --text:#eef4ff; --muted:#a8b5db; --accent:#7e7bff; --accent2:#2ee6c4; --danger:#ff6e91;
      --shadow:0 18px 50px rgba(0,0,0,.32);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#060b16,#08101f)}
    .wrap{width:min(1200px,calc(100% - 28px));margin:auto;padding:24px}
    .card{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(14px);box-shadow:var(--shadow);padding:20px;border-radius:22px;margin-bottom:20px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px}
    .brand{display:flex;align-items:center;gap:12px}
    .icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 26px rgba(126,123,255,.28);font-size:20px}
    .brand h1,.brand p{margin:0}
    .brand h1{font-size:1.1rem}
    .brand p{color:var(--muted)}

    .btn-row{display:flex;flex-wrap:wrap;gap:10px}
    .btn,.btn-ghost,.btn-danger{border:none;border-radius:999px;padding:12px 16px;font:inherit;font-weight:800;cursor:pointer}
    .btn{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}
    .btn-ghost{color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--line)}
    .btn-danger{color:#fff;background:linear-gradient(135deg,#f45f85,#ffa46a)}

    .grid,.form-grid,.summary-grid,.filters{display:grid;gap:18px}
    .grid{grid-template-columns:360px 1fr}
    .form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .full{grid-column:1/-1}
    .summary-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    .filters{grid-template-columns:1.2fr .8fr .8fr auto}

    label{display:block;margin-bottom:6px;color:var(--muted);font-size:.88rem;font-weight:700}
    input,select,textarea{width:100%;padding:12px 14px;border-radius:16px;border:1px solid rgba(151,179,255,.18);background:rgba(255,255,255,.05);color:var(--text);font:inherit}
    textarea{min-height:90px}

    .message,.note{border-radius:18px;padding:14px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.08);color:var(--muted)}
    .message{display:none;margin-top:12px}

    .list{display:grid;gap:12px;max-height:700px;overflow:auto}
    .order-row{padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);cursor:pointer}
    .order-row.active{border-color:rgba(46,230,196,.35)}

    .pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.7rem;margin-top:6px;margin-right:4px}
    .s-quote_sent{background:#ffd27a33;color:#ffd27a}
    .s-in_production{background:#7e7bff33;color:#7e7bff}
    .s-completed{background:#2ee6c433;color:#2ee6c4}

    @media (max-width:900px){.grid,.summary-grid,.form-grid,.filters{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card topbar">
      <div class="brand">
        <div class="icon">📦</div>
        <div>
          <h1>OliPoly Orders Admin</h1>
          <p>Supabase connected dashboard</p>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-ghost" id="refreshBtn">Refresh</button>
        <button class="btn-danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="form-grid">
        <input id="emailInput" placeholder="Email">
        <input id="passwordInput" type="password" placeholder="Password">
      </div>
      <div class="btn-row">
        <button class="btn-ghost" id="loginBtn">Login</button>
        <button class="btn" id="signupBtn">Create Account</button>
      </div>
      <div class="message" id="authMessage"></div>
    </div>

    <div class="card">
      <div class="filters">
        <input id="searchInput" placeholder="Search">
        <select id="statusFilter"><option value="all">All Status</option><option value="quote_sent">Quote</option><option value="in_production">Production</option><option value="completed">Completed</option></select>
        <select id="sortBy"><option value="new">Newest</option><option value="customer">Customer</option></select>
        <button id="clearFiltersBtn" class="btn-ghost">Clear</button>
      </div>
    </div>

    <div class="summary-grid">
      <div class="card"><b id="sumOrders">0</b><br>Total Orders</div>
      <div class="card"><b id="sumOpen">0</b><br>Open</div>
      <div class="card"><b id="sumCompleted">0</b><br>Completed</div>
      <div class="card"><b id="sumValue">$0</b><br>Total Value</div>
    </div>

    <div class="grid">

      <div class="card">
        <div class="btn-row">
          <button class="btn" id="newBtn">New</button>
          <button class="btn-ghost" id="loadBtn">Load</button>
        </div>
        <div id="orderList" class="list"></div>
      </div>

      <div class="card">
        <h3 id="detailTitle">Order</h3>
        <div class="form-grid">
          <input id="orderNumber" placeholder="Order #">
          <input id="orderDate" type="date">
          <input id="customerName" placeholder="Customer">
          <input id="customerEmail" placeholder="Email">
          <input id="orderTitle" class="full" placeholder="Item">
          <input id="orderTotal" type="number" placeholder="Total">
          <textarea id="publicStatusText" class="full" placeholder="Public status"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn" id="saveBtn">Save</button>
          <button class="btn-danger" id="deleteBtn">Delete</button>
        </div>
        <div id="formMessage" class="message"></div>
        <div id="publicPreview" class="note">Preview</div>
      </div>

    </div>

  </div>

<script>
const SUPABASE_URL='https://alffoktlwhpfothieude.supabase.co';
const KEY='sb_publishable_z7kdHOnVhLgBpn0uXwd4GA_tXwWQx_Y';
let token=localStorage.getItem('sb_token');
let orders=[];let activeId=null;

async function api(path,opt={}){
  const res=await fetch(SUPABASE_URL+path,{
    ...opt,
    headers:{apikey:KEY,'Content-Type':'application/json',Authorization:token?`Bearer ${token}`:'' ,...(opt.headers||{})}
  });
  return await res.json();
}

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let list=orders.filter(o=>!q||JSON.stringify(o).toLowerCase().includes(q));
  document.getElementById('sumOrders').textContent=list.length;
  document.getElementById('sumCompleted').textContent=list.filter(o=>o.status==='completed').length;
  document.getElementById('sumOpen').textContent=list.filter(o=>o.status!=='completed').length;
  document.getElementById('sumValue').textContent='$'+list.reduce((s,o)=>s+(o.order_total||0),0);
  document.getElementById('orderList').innerHTML=list.map(o=>`<div class="order-row" data-id="${o.id}">
  ${o.order_number}<br>${o.order_title}<br>
  <span class="pill s-${o.status}">${o.status}</span></div>`).join('');
  document.querySelectorAll('.order-row').forEach(e=>e.onclick=()=>load(e.dataset.id));
}

function load(id){
  const o=orders.find(x=>x.id===id);
  activeId=id;
  Object.keys(o).forEach(k=>{if(document.getElementById(k))document.getElementById(k).value=o[k]||''});
}

async function save(){
  const data={order_number:orderNumber.value,order_title:orderTitle.value,order_total:+orderTotal.value};
  if(activeId) await api(`/rest/v1/orders?id=eq.${activeId}`,{method:'PATCH',body:JSON.stringify(data)});
  else await api('/rest/v1/orders',{method:'POST',body:JSON.stringify(data)});
  await loadOrders();
}

async function loadOrders(){orders=await api('/rest/v1/orders?select=*');render();}

loginBtn.onclick=async()=>{const r=await api('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({email:emailInput.value,password:passwordInput.value})});token=r.access_token;localStorage.setItem('sb_token',token);loadOrders();}
signupBtn.onclick=()=>api('/auth/v1/signup',{method:'POST',body:JSON.stringify({email:emailInput.value,password:passwordInput.value})});
saveBtn.onclick=save;loadBtn.onclick=loadOrders;newBtn.onclick=()=>activeId=null;
</script>
</body>
</html>
