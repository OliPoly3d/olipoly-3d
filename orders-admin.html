<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OliPoly Orders Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Inter, sans-serif;
  padding: 20px;
}
button {
  padding: 10px 16px;
  margin: 6px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg,#de6fb8,#9d7cff);
  color: white;
}
input {
  padding: 10px;
  margin: 6px;
}
</style>
</head>

<body>

<h2>Orders Admin (Supabase)</h2>

<div>
  <input id="email" placeholder="email">
  <input id="password" placeholder="password" type="password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<hr>

<button onclick="createOrder()">Create Test Order</button>
<button onclick="loadOrders()">Load Orders</button>

<pre id="output"></pre>

<script>
const supabase = window.supabase.createClient(
  "https://alffoktlwhpfothieude.supabase.co",
  "sb_publishable_z7kdHOnVhLgBpn0uXwd4GA_tXwWQx_Y"
);

async function login() {
  await supabase.auth.signInWithPassword({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  });
  alert("Logged in");
}

async function signup() {
  await supabase.auth.signUp({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  });
  alert("Account created");
}

async function createOrder() {
  const user = (await supabase.auth.getUser()).data.user;

  if (!user) {
    alert("Login first");
    return;
  }

  await supabase.from('orders').insert({
    user_id: user.id,
    order_number: "OP-" + Math.floor(Math.random()*10000),
    order_title: "Test Order",
    order_total: 25,
    status: "quote_sent",
    payment_status: "unpaid"
  });

  alert("Order created");
}

async function loadOrders() {
  const { data } = await supabase.from('orders').select('*');
  document.getElementById('output').textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
