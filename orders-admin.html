<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OliPoly 3D | Orders Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#08101f; --panel:rgba(12,19,40,.88); --line:rgba(126,144,255,.18);
      --text:#eef4ff; --muted:#a8b5db; --accent:#7e7bff; --accent2:#2ee6c4; --danger:#ff6e91;
      --shadow:0 18px 50px rgba(0,0,0,.32);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#060b16,#08101f)}
    .wrap{width:min(1200px,calc(100% - 28px));margin:auto;padding:24px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow);margin-bottom:20px}
    input,select{width:100%;padding:10px;border-radius:12px;border:1px solid #333;background:#0b1328;color:#fff;margin-bottom:10px}
    button{padding:10px 16px;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(135deg,#de6fb8,#9d7cff);color:white}
    .msg{margin-top:10px;padding:10px;border-radius:10px;background:#111}
  </style>
</head>
<body>
<div class="wrap">

<div class="card">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Create Account</button>
  <div id="msg" class="msg">Ready</div>
</div>

<div class="card">
  <h3>Orders</h3>
  <button id="createBtn">Create Test Order</button>
  <button id="loadBtn">Load Orders</button>
  <pre id="output"></pre>
</div>

</div>

<script>
const msg = document.getElementById('msg');
const output = document.getElementById('output');
const email = document.getElementById('email');
const password = document.getElementById('password');

function show(m){ msg.textContent=m; console.log(m); }

const supabase = window.supabase.createClient(
  'https://alffoktlwhpfothieude.supabase.co',
  'sb_publishable_z7kdHOnVhLgBpn0uXwd4GA_tXwWQx_Y'
);

async function signup(){
  show('Creating account...');
  const {data,error}=await supabase.auth.signUp({
    email:email.value.trim(),password:password.value
  });
  if(error) return show('Error: '+error.message);
  if(data?.user && !data?.session) return show('Check email to confirm');
  show('Account created');
}

async function login(){
  show('Logging in...');
  const {error}=await supabase.auth.signInWithPassword({
    email:email.value.trim(),password:password.value
  });
  if(error) return show('Error: '+error.message);
  show('Logged in');
}

async function createOrder(){
  const {data:userData}=await supabase.auth.getUser();
  if(!userData.user) return show('Login first');

  const {error}=await supabase.from('orders').insert({
    user_id:userData.user.id,
    order_number:'OP-'+Math.floor(Math.random()*10000),
    order_title:'Test Order',
    order_total:25,
    status:'quote_sent',
    payment_status:'unpaid'
  });

  if(error) return show('Error: '+error.message);
  show('Order created');
}

async function loadOrders(){
  const {data,error}=await supabase.from('orders').select('*');
  if(error) return show('Error: '+error.message);
  output.textContent=JSON.stringify(data,null,2);
  show('Loaded');
}

document.getElementById('signupBtn').onclick=signup;
document.getElementById('loginBtn').onclick=login;
document.getElementById('createBtn').onclick=createOrder;
document.getElementById('loadBtn').onclick=loadOrders;
</script>

</body>
</html>
