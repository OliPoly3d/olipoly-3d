<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track Order</title>

<style>
body{font-family:Inter,sans-serif;padding:20px;background:#fff;color:#333}
.card{background:#fafafa;padding:20px;border-radius:16px}
button{padding:10px 16px;border-radius:999px;border:none;background:linear-gradient(135deg,#de6fb8,#9d7cff);color:white}
.note{margin-top:12px}
</style>
</head>

<body>

<h2>Track Your Order</h2>

<div class="card">
<input id="orderInput" placeholder="Order #">
<button onclick="lookup()">Track</button>
<div id="msg" class="note"></div>

<div id="result" style="display:none;">
<h3 id="title"></h3>
<p id="status"></p>
<p id="next"></p>
<p id="ship"></p>
<p id="track"></p>
<a id="pay" target="_blank">Payment Link</a>
</div>
</div>

<script>
const URL='https://alffoktlwhpfothieude.supabase.co';
const KEY='sb_publishable_z7kdHOnVhLgBpn0uXwd4GA_tXwWQx_Y';

async function lookup(){

  const id=orderInput.value;

  const res=await fetch(
    URL + `/rest/v1/order_tracking_public?order_number=eq.${encodeURIComponent(id)}&limit=1`,
    {headers:{apikey:KEY}}
  );

  const data=await res.json();

  if(!data.length){
    msg.innerText="Order not found";
    result.style.display="none";
    return;
  }

  const o=data[0];

  result.style.display="block";
  title.innerText=o.order_title;
  status.innerText=o.status;
  next.innerText=o.public_next_step || "";
  ship.innerText=o.shipping_or_pickup_note || "";
  track.innerText=o.tracking_number || "";

  if(o.payment_link){
    pay.href=o.payment_link;
    pay.innerText="Pay Here";
  }
}
</script>

</body>
</html>
